name: Enrich Goodreads Genres

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Controlla i file della repository
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installa le librerie necessarie
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Esegui lo script di arricchimento
      run: python enrich.py

    - name: Salva il file aggiornato su GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Aggiornato export con i generi dei libri"
        file_pattern: 'goodreads_enriched.csv'
